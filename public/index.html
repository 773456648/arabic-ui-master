<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEIBA Royal | منصة الاتصالات الملكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0c; }
        body { background: var(--bg); color: #fff; font-family: 'Changa', sans-serif; overflow: hidden; height: 100vh; }
        .gold-text { color: var(--gold); }
        .video-container { position: relative; width: 100%; height: 70vh; background: #000; border-radius: 20px; border: 1px solid var(--gold); overflow: hidden; }
        .remote-video { width: 100%; height: 100%; object-fit: cover; }
        .local-video { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 160px; border-radius: 12px; border: 2px solid var(--gold); }
    </style>
</head>
<body class="flex flex-col">

    <div id="auth-ui" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 p-4">
        <div class="bg-[#131318] w-full max-w-md p-10 rounded-3xl border border-gold/20 text-center">
            <i class="fa-solid fa-crown text-5xl gold-text mb-4"></i>
            <h1 class="text-3xl font-black mb-6">HEIBA <span class="gold-text">ROYAL</span></h1>
            <input id="u-name" type="text" placeholder="اسم المستخدم" class="w-full bg-white/5 p-4 rounded-xl mb-4 outline-none border border-white/10 focus:border-gold">
            <input id="u-pass" type="password" placeholder="كلمة المرور" class="w-full bg-white/5 p-4 rounded-xl mb-6 outline-none border border-white/10 focus:border-gold">
            <button onclick="doAuth()" class="w-full bg-gold text-black font-bold py-4 rounded-xl shadow-lg">تسجيل الدخول</button>
        </div>
    </div>

    <div id="main-ui" class="hidden flex h-screen w-full">
        <div class="w-80 bg-[#131318] border-l border-white/5 flex flex-col">
            <div class="p-4 border-b border-white/5 flex justify-between">
                <span id="my-name" class="font-bold">...</span>
                <i class="fa-solid fa-shield-halved gold-text"></i>
            </div>
            <div id="users-list" class="flex-1 overflow-y-auto"></div>
        </div>

        <div class="flex-1 flex flex-col bg-[#0f0f13]">
            <div id="chat-header" class="hidden h-16 border-b border-white/5 flex items-center justify-between px-6">
                <h3 id="chat-user-name" class="font-bold">...</h3>
                <div class="flex gap-6">
                    <button onclick="initiateCall('video')" class="gold-text text-xl"><i class="fa-solid fa-video"></i></button>
                </div>
            </div>
            <div id="chat-messages" class="flex-1 p-6 overflow-y-auto flex flex-col gap-3"></div>
            <div id="chat-input-area" class="hidden p-4 bg-[#131318]">
                <div class="flex gap-3 bg-white/5 p-2 rounded-2xl">
                    <input id="msg-input" type="text" class="flex-1 bg-transparent px-2 outline-none" placeholder="اكتب رسالتك...">
                    <button onclick="sendMessage()" class="bg-gold text-black p-2 rounded-xl px-4"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="call-screen" class="hidden fixed inset-0 z-[200] bg-black/95 flex flex-col items-center justify-center p-6">
        <div class="video-container">
            <video id="remoteVideo" autoplay playsinline class="remote-video"></video>
            <video id="localVideo" autoplay playsinline muted class="local-video"></video>
        </div>
        <button onclick="location.reload()" class="mt-8 bg-red-600 w-16 h-16 rounded-full"><i class="fa-solid fa-phone-slash text-2xl"></i></button>
    </div>

    <div id="incoming-modal" class="hidden fixed top-5 left-1/2 -translate-x-1/2 bg-[#1a1a20] border border-gold p-5 rounded-2xl z-[300] flex items-center gap-10">
        <div class="text-white font-bold">اتصال من: <span id="caller-name"></span></div>
        <div class="flex gap-4">
            <button onclick="acceptCall()" class="bg-green-600 p-3 rounded-full"><i class="fa-solid fa-phone"></i></button>
            <button onclick="location.reload()" class="bg-red-600 p-3 rounded-full"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>

    <script>
        let currentUser, selectedUser, socket, localStream, peerConnection;
        let servers = { iceServers: [] };

        async function doAuth() {
            const name = document.getElementById('u-name').value;
            const password = document.getElementById('u-pass').value;
            const res = await fetch('/api/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, password, action: 'login' }) });
            const data = await res.json();
            if(res.ok) {
                currentUser = data;
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                document.getElementById('my-name').innerText = currentUser.name;
                fetchSync(); initializeSocket();
            }
        }

        async function fetchSync() {
            const res = await fetch('/api/sync');
            const data = await res.json();
            if (data.iceServers) servers.iceServers = data.iceServers;
            renderUsers(data.users);
        }

        function initializeSocket() {
            socket = io();
            socket.emit('user_connected', currentUser.id);
            socket.on('update_users_status', fetchSync);
            socket.on('receive_message', appendMessage);
            socket.on('incoming_call', (data) => {
                window.callData = data;
                document.getElementById('caller-name').innerText = data.name;
                document.getElementById('incoming-modal').classList.remove('hidden');
                document.getElementById('ringtone').play();
            });
            socket.on('call_accepted', async (signal) => { await peerConnection.setRemoteDescription(new RTCSessionDescription(signal)); });
            socket.on('ice_candidate', async (data) => { if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); });
        }

        async function initiateCall(type) {
            document.getElementById('call-screen').classList.remove('hidden');
            peerConnection = new RTCPeerConnection(servers);
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.onicecandidate = e => e.candidate && socket.emit('ice_candidate', { to: selectedUser.id, candidate: e.candidate, from: currentUser.id });
            peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('call_user', { userToCall: selectedUser.id, from: currentUser.id, name: currentUser.name, signalData: offer });
        }

        async function acceptCall() {
            document.getElementById('ringtone').pause();
            document.getElementById('incoming-modal').classList.add('hidden');
            document.getElementById('call-screen').classList.remove('hidden');
            peerConnection = new RTCPeerConnection(servers);
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.onicecandidate = e => e.candidate && socket.emit('ice_candidate', { to: window.callData.from, candidate: e.candidate, from: currentUser.id });
            peerConnection.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
            await peerConnection.setRemoteDescription(new RTCSessionDescription(window.callData.signalData));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer_call', { to: window.callData.from, signal: answer });
        }

        function renderUsers(users) {
            const list = document.getElementById('users-list');
            list.innerHTML = users.filter(u => u.id !== currentUser.id).map(u => `
                <div onclick="openChat('${u.id}', '${u.name}')" class="p-4 border-b border-white/5 cursor-pointer hover:bg-white/5">
                    <div class="font-bold">${u.name}</div>
                    <div class="text-xs ${u.isOnline ? 'text-green-500' : 'text-gray-500'}">${u.isOnline ? 'متصل الآن' : 'غير متصل'}</div>
                </div>
            `).join('');
        }

        function openChat(id, name) {
            selectedUser = { id, name };
            document.getElementById('chat-header').classList.remove('hidden');
            document.getElementById('chat-input-area').classList.remove('hidden');
            document.getElementById('chat-user-name').innerText = name;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const msg = { from: currentUser.id, to: selectedUser.id, text: input.value };
            socket.emit('send_message', msg);
            appendMessage(msg);
            input.value = '';
        }

        function appendMessage(m) {
            const container = document.getElementById('chat-messages');
            const isMe = m.from === currentUser.id;
            container.innerHTML += `<div class="p-3 rounded-xl max-w-[80%] ${isMe ? 'bg-gold text-black self-start' : 'bg-white/10 self-end'}">${m.text}</div>`;
        }
    </script>
</body>
</html>
