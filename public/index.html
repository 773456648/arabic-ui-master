<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 FADI CONNECT | الملكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.metered.ca/sdk/frame/1.4.3/sdk-frame.min.js"></script>
    <style>
        body { background: #0b0719; color: white; font-family: 'Changa', sans-serif; }
        .glass { background: rgba(20, 15, 40, 0.7); backdrop-filter: blur(15px); border: 2px solid gold; border-radius: 40px; }
        .gold-glow { text-shadow: 0 0 15px gold; color: gold; }
        #metered-frame { width: 100%; height: 70vh; border-radius: 30px; border: 2px solid gold; overflow: hidden; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,215,0,0.3); padding: 15px; border-radius: 50px; text-align: center; color: white; outline: none; }
        input:focus { border-color: gold; box-shadow: 0 0 15px gold; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="login-ui" class="glass w-full max-w-md p-10 text-center shadow-[0_0_50px_rgba(255,215,0,0.2)]">
        <div class="text-6xl mb-4">👑</div>
        <h1 class="text-3xl font-bold gold-glow mb-8">FADI CONNECT</h1>
        <input id="user-name" type="text" placeholder="أدخل اسمك الملكي" class="w-full mb-6">
        <button onclick="startSystem()" class="w-full bg-gold text-black font-bold py-4 rounded-full shadow-lg hover:bg-yellow-500 transition-all text-xl">🚀 تشغيل المنظومة</button>
    </div>

    <div id="call-ui" class="hidden w-full max-w-5xl">
        <div class="glass p-6 mb-6 flex justify-between items-center">
            <h2 class="text-2xl font-bold gold-glow">المتصل: <span id="display-name" class="text-white"></span></h2>
            <button onclick="location.reload()" class="bg-red-600 text-white px-8 py-3 rounded-full font-bold">إنهاء</button>
        </div>
        <div id="metered-frame"></div>
    </div>

    <script>
        const ROOM_URL = "heiba-royal-2024.metered.live/heiba-royal-2024";

        async function startSystem() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("أدخل اسمك أولاً");

            // إشعار التلجرام
            await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            });

            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('call-ui').classList.remove('hidden');
            document.getElementById('display-name').innerText = name;

            // تشغيل الفيديو الملكي
            const frame = new MeteredFrame();
            frame.init({
                rows: 1, cols: 1,
                roomURL: ROOM_URL
            }, document.getElementById("metered-frame"));
        }
    </script>
</body>
</html>
