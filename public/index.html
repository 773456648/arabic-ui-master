<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEIBA Royal | منصة الاتصالات الملكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.metered.ca/sdk/frame/1.4.3/sdk-frame.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #0a0a0c; }
        body { background: var(--bg); color: #fff; font-family: 'Changa', sans-serif; overflow: hidden; height: 100vh; }
        .gold-text { color: var(--gold); }
        /* تصميم إطار الفيديو ليكون فخماً */
        #metered-frame { width: 100%; height: 75vh; border-radius: 20px; border: 2px solid var(--gold); overflow: hidden; background: #000; box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); }
        .user-card:hover { background: rgba(212, 175, 55, 0.05); }
    </style>
</head>
<body class="flex flex-col">

    <div id="auth-ui" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-4">
        <div class="bg-[#131318] w-full max-w-md p-10 rounded-3xl border border-gold/20 text-center shadow-2xl">
            <i class="fa-solid fa-crown text-6xl gold-text mb-6"></i>
            <h1 class="text-3xl font-black mb-8 tracking-widest">HEIBA <span class="gold-text">ROYAL</span></h1>
            <input id="u-name" type="text" placeholder="اسم المستخدم" class="w-full bg-white/5 p-4 rounded-xl mb-4 outline-none border border-white/10 focus:border-gold text-center">
            <input id="u-pass" type="password" placeholder="كلمة المرور" class="w-full bg-white/5 p-4 rounded-xl mb-8 outline-none border border-white/10 focus:border-gold text-center">
            <button onclick="doAuth()" class="w-full bg-gold text-black font-bold py-4 rounded-xl shadow-lg hover:bg-yellow-500 transition-all">فتح النظام الملكي</button>
        </div>
    </div>

    <div id="main-ui" class="hidden flex h-screen w-full">
        <div class="w-80 bg-[#131318] border-l border-white/5 flex flex-col">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-black/20">
                <span id="my-name" class="font-bold gold-text text-xl">...</span>
                <i class="fa-solid fa-shield-halved text-gray-500"></i>
            </div>
            <div id="users-list" class="flex-1 overflow-y-auto"></div>
        </div>

        <div class="flex-1 flex flex-col bg-[#0f0f13] relative">
            <div id="welcome-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-[#0f0f13] z-10">
                <i class="fa-solid fa-fingerprint text-7xl text-gray-800 mb-4"></i>
                <h2 class="text-gray-500 text-xl">في انتظار اختيار الهدف...</h2>
            </div>

            <div id="chat-header" class="hidden h-20 border-b border-white/5 flex items-center justify-between px-8 bg-[#131318] z-20">
                <h3 id="chat-user-name" class="font-bold text-xl">...</h3>
                <div class="flex gap-4">
                    <button onclick="startRoyalCall()" class="bg-gold/10 hover:bg-gold/20 text-gold px-6 py-2 rounded-full border border-gold/30 transition">
                        <i class="fa-solid fa-video ml-2"></i> اشتباك فيديو
                    </button>
                </div>
            </div>

            <div id="video-display" class="hidden flex-1 p-6 z-20 overflow-y-auto">
                <div id="metered-frame"></div>
                <button onclick="location.reload()" class="mt-4 w-full bg-red-600/20 text-red-500 py-3 rounded-xl border border-red-600/30 hover:bg-red-600 hover:text-white transition">إنهاء الجلسة</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser, selectedUser, socket;
        // ملاحظة: الرابط أدناه هو رابط غرفتك الذي أنشأته
        const ROOM_URL = "heiba-royal-2024.metered.ca/heiba-royal-2024"; 

        async function doAuth() {
            const name = document.getElementById('u-name').value;
            const password = document.getElementById('u-pass').value;
            const res = await fetch('/api/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, password, action: 'login' }) });
            const data = await res.json();
            if(res.ok) {
                currentUser = data;
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                document.getElementById('my-name').innerText = currentUser.name;
                fetchSync(); initializeSocket();
            } else alert(data.error);
        }

        async function fetchSync() {
            const res = await fetch('/api/sync');
            const data = await res.json();
            renderUsers(data.users);
        }

        function initializeSocket() {
            socket = io();
            socket.emit('user_connected', currentUser.id);
            socket.on('update_users_status', fetchSync);
        }

        function renderUsers(users) {
            const list = document.getElementById('users-list');
            list.innerHTML = users.filter(u => u.id !== currentUser.id).map(u => `
                <div onclick="openTarget('${u.id}', '${u.name}')" class="user-card p-5 border-b border-white/5 cursor-pointer transition-all">
                    <div class="flex items-center gap-3">
                        <div class="w-3 h-3 rounded-full ${u.isOnline ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : 'bg-gray-600'}"></div>
                        <div class="font-bold text-lg">${u.name}</div>
                    </div>
                </div>
            `).join('');
        }

        function openTarget(id, name) {
            selectedUser = { id, name };
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('chat-header').classList.remove('hidden');
            document.getElementById('chat-user-name').innerText = name;
        }

        function startRoyalCall() {
            document.getElementById('video-display').classList.remove('hidden');
            // تشغيل الـ SDK Frame الذي نسخته أنت
            const frame = new MeteredFrame();
            frame.init({
                rows: 1,
                cols: 1,
                roomURL: ROOM_URL
            }, document.getElementById("metered-frame"));
        }
    </script>
</body>
</html>
