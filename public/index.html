<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEIBA Royal | منصة الاتصالات الملكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-hover: #e0bc48;
            --bg-main: #0a0a0c;
            --bg-sidebar: #131318;
            --bg-chat: #0f0f13;
            --glass-bg: rgba(20, 20, 25, 0.85);
        }

        body { 
            background-color: var(--bg-main); 
            color: #f0f0f0; 
            font-family: 'Changa', sans-serif; 
            overflow: hidden;
            height: 100vh;
        }

        /* تخصيص شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-primary); }

        .gold-text { color: var(--gold-primary); }
        .gold-border { border-color: var(--gold-primary); }

        /* شاشة الدخول */
        .auth-container {
            background: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.1) 0%, var(--bg-main) 70%);
        }
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* فقاعات المحادثة */
        .msg-bubble {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 16px;
            margin-bottom: 4px;
            font-size: 15px;
            position: relative;
            line-height: 1.5;
        }
        .msg-sent {
            background: var(--gold-primary);
            color: #000;
            align-self: flex-start;
            border-bottom-right-radius: 4px;
        }
        .msg-received {
            background: #23232b;
            color: #fff;
            align-self: flex-end;
            border-bottom-left-radius: 4px;
        }
        .msg-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            display: block;
            text-align: left;
        }

        /* شاشة الاتصال */
        .call-overlay {
            background: rgba(10, 10, 12, 0.95);
            backdrop-filter: blur(15px);
            z-index: 50;
        }
        .video-container { position: relative; width: 100%; height: 100%; max-height: 70vh; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .remote-video { width: 100%; height: 100%; object-fit: cover; }
        .local-video { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 160px; object-fit: cover; border-radius: 12px; border: 2px solid var(--gold-primary); background: #222; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .user-item.active { background: rgba(212, 175, 55, 0.1); border-right: 3px solid var(--gold-primary); }
    </style>
</head>
<body class="flex flex-col">

    <div id="auth-ui" class="auth-container fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="auth-card w-full max-w-md p-10 rounded-3xl text-center">
            <div class="mb-8">
                <i class="fa-solid fa-crown text-5xl gold-text mb-4"></i>
                <h1 class="text-4xl font-black text-white tracking-wider">HEIBA <span class="gold-text">ROYAL</span></h1>
                <p class="text-gray-400 text-sm mt-2">نظام الاتصالات المشفر</p>
            </div>
            
            <div class="space-y-5">
                <div class="relative">
                    <i class="fa-solid fa-user absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input id="u-name" type="text" placeholder="اسم المستخدم" class="w-full bg-[#1a1a20] border border-white/10 text-white px-12 py-4 rounded-xl outline-none focus:border-[#d4af37] transition">
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input id="u-pass" type="password" placeholder="كلمة المرور" class="w-full bg-[#1a1a20] border border-white/10 text-white px-12 py-4 rounded-xl outline-none focus:border-[#d4af37] transition">
                </div>
                <button onclick="doAuth()" class="w-full bg-[#d4af37] text-black font-bold py-4 rounded-xl hover:bg-[#e0bc48] transition transform hover:scale-[1.02] shadow-[0_0_15px_rgba(212,175,55,0.4)]">تسجيل الدخول</button>
            </div>
        </div>
    </div>

    <div id="main-ui" class="hidden flex h-screen w-full">
        
        <div class="w-80 bg-[var(--bg-sidebar)] flex flex-col border-l border-white/5">
            <div class="p-4 border-b border-white/5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-full bg-[#2a2a35] border border-[#d4af37] flex items-center justify-center text-[#d4af37] font-bold text-xl">
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                    <div>
                        <h2 id="my-name" class="font-bold text-white">...</h2>
                        <span class="text-xs text-green-500"><i class="fa-solid fa-circle text-[8px]"></i> متصل</span>
                    </div>
                </div>
                <button onclick="location.reload()" class="text-gray-500 hover:text-red-500 transition"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>

            <div class="p-4">
                <div class="bg-[#1a1a20] rounded-lg flex items-center px-3 py-2 border border-white/5">
                    <i class="fa-solid fa-search text-gray-500 text-sm"></i>
                    <input type="text" placeholder="بحث..." class="bg-transparent border-none text-white text-sm outline-none px-3 w-full">
                </div>
            </div>

            <div id="users-list" class="flex-1 overflow-y-auto">
                </div>
        </div>

        <div class="flex-1 flex flex-col bg-[var(--bg-chat)] relative">
            
            <div id="welcome-screen" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-[var(--bg-chat)]">
                <i class="fa-solid fa-crown text-6xl text-gray-800 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-500">منصة هيبة رويال</h2>
                <p class="text-gray-600 mt-2">اختر محادثة للبدء</p>
            </div>

            <div id="chat-header" class="hidden h-16 border-b border-white/5 flex items-center justify-between px-6 bg-[var(--bg-sidebar)]">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-[#2a2a35] flex items-center justify-center text-white"><i class="fa-solid fa-user"></i></div>
                    <div>
                        <h3 id="chat-user-name" class="font-bold text-white">...</h3>
                        <p id="chat-user-status" class="text-xs text-gray-400">...</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="initiateCall('voice')" class="w-10 h-10 rounded-full bg-[#1a1a20] text-[#d4af37] hover:bg-[#d4af37] hover:text-black transition flex items-center justify-center"><i class="fa-solid fa-phone"></i></button>
                    <button onclick="initiateCall('video')" class="w-10 h-10 rounded-full bg-[#1a1a20] text-[#d4af37] hover:bg-[#d4af37] hover:text-black transition flex items-center justify-center"><i class="fa-solid fa-video"></i></button>
                </div>
            </div>

            <div id="chat-messages" class="hidden flex-1 p-6 overflow-y-auto flex flex-col gap-2">
                </div>

            <div id="chat-input-area" class="hidden p-4 bg-[var(--bg-sidebar)] border-t border-white/5">
                <div class="flex items-center gap-3 bg-[#1a1a20] p-2 rounded-2xl border border-white/5">
                    <button class="text-gray-400 hover:text-[#d4af37] px-3"><i class="fa-regular fa-face-smile text-xl"></i></button>
                    <button class="text-gray-400 hover:text-[#d4af37] px-2"><i class="fa-solid fa-paperclip text-xl"></i></button>
                    <input id="msg-input" type="text" placeholder="اكتب رسالتك هنا..." class="flex-1 bg-transparent text-white outline-none px-2" onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button onclick="sendMessage()" class="bg-[#d4af37] text-black w-10 h-10 rounded-xl flex items-center justify-center hover:bg-[#e0bc48] transition"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="call-screen" class="hidden call-overlay absolute inset-0 flex flex-col items-center justify-center p-6">
                <h2 id="call-status-text" class="text-2xl font-bold mb-6 text-white tracking-wide">جاري الاتصال بـ <span class="gold-text" id="call-target-name">...</span></h2>
                
                <div class="video-container shadow-2xl">
                    <video id="remoteVideo" autoplay playsinline class="remote-video"></video>
                    <video id="localVideo" autoplay playsinline muted class="local-video"></video>
                </div>

                <div class="flex gap-6 mt-8">
                    <button class="w-14 h-14 rounded-full bg-[#2a2a35] text-white hover:bg-gray-600 transition text-xl shadow-lg"><i class="fa-solid fa-microphone-slash"></i></button>
                    <button onclick="endCall()" class="w-16 h-16 rounded-full bg-red-600 text-white hover:bg-red-700 transition text-2xl shadow-[0_0_20px_rgba(220,38,38,0.5)]"><i class="fa-solid fa-phone-slash"></i></button>
                    <button class="w-14 h-14 rounded-full bg-[#2a2a35] text-white hover:bg-gray-600 transition text-xl shadow-lg"><i class="fa-solid fa-video-slash"></i></button>
                </div>
            </div>

            <div id="incoming-call-modal" class="hidden absolute top-10 left-1/2 transform -translate-x-1/2 bg-[#1a1a20] border border-[#d4af37] rounded-2xl p-4 shadow-[0_0_30px_rgba(0,0,0,0.8)] z-[100] flex items-center gap-6">
                <div class="animate-pulse w-12 h-12 bg-[#d4af37]/20 rounded-full flex items-center justify-center text-[#d4af37] text-xl"><i class="fa-solid fa-phone-volume"></i></div>
                <div>
                    <h3 class="font-bold text-white">مكالمة واردة</h3>
                    <p id="caller-name" class="text-sm text-gray-400">...</p>
                </div>
                <div class="flex gap-2 mr-4">
                    <button onclick="acceptCall()" class="bg-green-600 w-10 h-10 rounded-full text-white hover:bg-green-500"><i class="fa-solid fa-phone"></i></button>
                    <button onclick="rejectCall()" class="bg-red-600 w-10 h-10 rounded-full text-white hover:bg-red-500"><i class="fa-solid fa-phone-slash"></i></button>
                </div>
            </div>

        </div>
    </div>

    <audio id="ringtone" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>

    <script>
        let currentUser = null;
        let selectedUser = null;
        let usersData = [];
        let socket;
        
        // WebRTC Variables
        let localStream;
        let peerConnection;
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        // 1. تسجيل الدخول
        async function doAuth() {
            const name = document.getElementById('u-name').value;
            const password = document.getElementById('u-pass').value;
            if(!name || !password) return alert("الرجاء إدخال البيانات");

            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, password, action: 'login' })
                });
                const data = await res.json();
                
                if(res.ok) {
                    currentUser = data;
                    document.getElementById('auth-ui').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                    document.getElementById('my-name').innerText = currentUser.name;
                    
                    // جلب البيانات الأولية
                    fetchInitialData();
                    // تفعيل السوكيت
                    initializeSocket();
                } else {
                    alert(data.error);
                }
            } catch(e) { alert("خطأ في الاتصال"); }
        }

        async function fetchInitialData() {
            const res = await fetch(`/api/sync?userId=${currentUser.id}`);
            const data = await res.json();
            usersData = data.users;
            renderUsers();
            // يمكننا تخزين الرسائل محلياً هنا
        }

        // 2. إعداد الاتصال الفوري (Socket.io)
        function initializeSocket() {
            socket = io(); // يتصل تلقائياً بنفس السيرفر

            socket.on('connect', () => {
                socket.emit('user_connected', currentUser.id);
            });

            // تحديث حالة المستخدمين
            socket.on('update_users_status', (data) => {
                const userIndex = usersData.findIndex(u => u.id === data.userId);
                if(userIndex !== -1) {
                    usersData[userIndex].isOnline = (data.status === 'online');
                    renderUsers();
                    if(selectedUser && selectedUser.id === data.userId) {
                        document.getElementById('chat-user-status').innerText = data.status === 'online' ? 'متصل الآن' : 'غير متصل';
                        document.getElementById('chat-user-status').className = data.status === 'online' ? 'text-xs text-green-500' : 'text-xs text-gray-500';
                    }
                }
            });

            // استلام رسالة جديدة
            socket.on('receive_message', (msg) => {
                if(selectedUser && (msg.from === selectedUser.id || msg.to === selectedUser.id)) {
                    appendMessage(msg);
                } else {
                    // تشغيل صوت تنبيه لرسالة من شخص آخر
                }
            });

            // استقبال مكالمة
            socket.on('incoming_call', (data) => {
                document.getElementById('caller-name').innerText = data.name;
                document.getElementById('incoming-call-modal').classList.remove('hidden');
                document.getElementById('ringtone').play();
                // حفظ بيانات المتصل مؤقتاً
                window.incomingCallData = data; 
            });
        }

        // 3. واجهة المستخدم والمحادثة
        function renderUsers() {
            const list = document.getElementById('users-list');
            list.innerHTML = usersData.filter(u => u.id !== currentUser.id).map(u => `
                <div onclick="openChat('${u.id}', '${u.name}', ${u.isOnline})" class="user-item p-4 flex items-center gap-3 cursor-pointer hover:bg-white/5 transition ${selectedUser?.id === u.id ? 'active' : ''}">
                    <div class="relative w-12 h-12 rounded-full bg-[#2a2a35] flex items-center justify-center text-white text-lg">
                        ${u.name.charAt(0)}
                        ${u.isOnline ? '<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-[var(--bg-sidebar)]"></div>' : ''}
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-sm text-gray-200">${u.name}</h4>
                        <p class="text-xs text-gray-500 truncate">${u.isOnline ? 'متصل' : 'غير متصل'}</p>
                    </div>
                </div>
            `).join('');
        }

        function openChat(id, name, isOnline) {
            selectedUser = { id, name };
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('chat-header').classList.remove('hidden');
            document.getElementById('chat-messages').classList.remove('hidden');
            document.getElementById('chat-input-area').classList.remove('hidden');
            
            document.getElementById('chat-user-name').innerText = name;
            document.getElementById('chat-user-status').innerText = isOnline ? 'متصل الآن' : 'غير متصل';
            document.getElementById('chat-user-status').className = isOnline ? 'text-xs text-green-500' : 'text-xs text-gray-500';
            
            document.getElementById('chat-messages').innerHTML = ''; // تفريغ الشات
            renderUsers(); // لتحديث التحديد
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text || !selectedUser) return;

            const msgObj = { from: currentUser.id, to: selectedUser.id, text, time: new Date() };
            
            // إرسال للسوكيت
            socket.emit('send_message', msgObj);
            appendMessage(msgObj);
            input.value = '';
        }

        function appendMessage(m) {
            const container = document.getElementById('chat-messages');
            const isMe = m.from === currentUser.id;
            const time = new Date(m.time).toLocaleTimeString('ar-YE', { hour: '2-digit', minute: '2-digit' });
            
            container.innerHTML += `
                <div class="msg-bubble ${isMe ? 'msg-sent' : 'msg-received'}">
                    ${m.text}
                    <span class="msg-time ${isMe ? 'text-black/60' : 'text-white/40'}">${time}</span>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
        }

        // 4. نظام المكالمات (WebRTC & Socket)
        async function initiateCall(type) {
            if(!selectedUser) return;
            document.getElementById('call-screen').classList.remove('hidden');
            document.getElementById('call-target-name').innerText = selectedUser.name;
            document.getElementById('call-status-text').innerHTML = `جاري الاتصال بـ <span class="gold-text">${selectedUser.name}</span>...`;

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: type === 'video', audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                
                // هنا يتم إرسال إشارة الرنين للطرف الآخر
                socket.emit('call_user', { userToCall: selectedUser.id, from: currentUser.id, name: currentUser.name, signalData: '...' });
            } catch(e) {
                alert("لم نتمكن من الوصول للكاميرا/المايكروفون");
                endCall();
            }
        }

        function acceptCall() {
            document.getElementById('ringtone').pause();
            document.getElementById('incoming-call-modal').classList.add('hidden');
            document.getElementById('call-screen').classList.remove('hidden');
            
            const caller = window.incomingCallData;
            document.getElementById('call-status-text').innerText = "مكالمة جارية...";
            
            // تهيئة الكاميرا والرد
            navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                localStream = stream;
                document.getElementById('localVideo').srcObject = stream;
                socket.emit('answer_call', { to: caller.from, signal: '...' });
            });
        }

        function rejectCall() {
            document.getElementById('ringtone').pause();
            document.getElementById('incoming-call-modal').classList.add('hidden');
            socket.emit('reject_call', { to: window.incomingCallData.from });
        }

        function endCall() {
            if(localStream) localStream.getTracks().forEach(track => track.stop());
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('call-screen').classList.add('hidden');
            // إبلاغ الطرف الآخر بالإنهاء
        }
    </script>
</body>
</html>
