<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FADI OPERATIONS | TACTICAL C2</title>
    <!-- تضمين مكتبات الخرائط والرسوم -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --primary: #00ff9d;
            --bg: #05070a;
            --panel: #0d1117;
            --border: #30363d;
            --danger: #ff4a4a;
            --font: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Status Bar */
        .status-header {
            height: 40px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 11px;
            justify-content: space-between;
        }

        /* Layout Grid */
        .grid-container {
            display: grid;
            grid-template-columns: 350px 1fr 380px;
            grid-template-rows: 1fr 250px;
            flex: 1;
            gap: 5px;
            padding: 5px;
            background: #000;
        }

        .pane {
            background: var(--panel);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .pane-header {
            background: #161b22;
            padding: 5px 10px;
            font-size: 10px;
            font-weight: bold;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            color: #8b949e;
        }

        /* Map Section */
        #map { height: 100%; width: 100%; background: #000 !important; }

        /* Decryption Visualizer */
        .decrypt-box {
            padding: 10px;
            font-size: 12px;
            overflow: hidden;
            background: #000;
            flex: 1;
        }

        .hash-line {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #111;
            padding: 2px 0;
        }

        .hash-char { color: var(--danger); }

        /* Radar View */
        .radar-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
            position: relative;
        }

        .radar-circle {
            position: absolute;
            border: 1px solid rgba(0, 255, 157, 0.1);
            border-radius: 50%;
        }

        .radar-sweep {
            position: absolute;
            width: 150px;
            height: 150px;
            background: conic-gradient(from 0deg, rgba(0, 255, 157, 0.3) 0%, transparent 50%);
            border-radius: 50%;
            animation: sweep 4s linear infinite;
        }

        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Logs Console */
        .console {
            background: #000;
            padding: 10px;
            font-size: 11px;
            overflow-y: auto;
            flex: 1;
            color: #d1d5db;
        }

        .log-entry { margin-bottom: 3px; border-left: 2px solid var(--primary); padding-left: 8px; }
        .ts { color: #8b949e; margin-right: 5px; }

        /* Targets List */
        .target-card {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
        }

        .target-card:hover { background: #1f2937; cursor: pointer; }

        .progress-mini {
            height: 3px;
            background: #222;
            margin-top: 5px;
        }
        .progress-inner { height: 100%; background: var(--primary); transition: width 0.5s; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); }

    </style>
</head>
<body>

<div class="status-header">
    <div>
        <span style="color:var(--danger)">● LIVE SESSION</span> | 
        ID: F-8821-X | 
        PROXY: TUN-AES-256 | 
        NODES: 1,429
    </div>
    <div id="clock">00:00:00 UTC</div>
</div>

<div class="grid-container">
    <!-- Left: Targets and Payload -->
    <div class="pane">
        <div class="pane-header">INFILTRATION TARGETS <span>[ACTIVE]</span></div>
        <div id="targets-list" style="overflow-y:auto; flex:1;">
            <!-- Targets injected here -->
        </div>
        <div class="pane" style="height: 150px; border:none; border-top: 1px solid var(--border)">
            <div class="pane-header">PAYLOAD GENERATOR</div>
            <div style="padding:10px; display:flex; flex-direction:column; gap:5px;">
                <select style="background:#000; color:var(--primary); border:1px solid var(--border); font-size:10px; padding:3px;">
                    <option>STAGED_REVERSE_TCP</option>
                    <option>SILENT_KEYLOGGER_V3</option>
                    <option>KERNEL_EXPLOIT_LPE</option>
                </select>
                <button onclick="generatePayload()" style="background:var(--primary); border:none; color:#000; font-size:10px; padding:5px; font-weight:bold; cursor:pointer;">INJECT PAYLOAD</button>
            </div>
        </div>
    </div>

    <!-- Center: Global Map and Radar -->
    <div style="display:flex; flex-direction:column; gap:5px;">
        <div class="pane" style="flex:1;">
            <div class="pane-header">GLOBAL INTELLIGENCE FEED <span>GEO_TRACKING: ON</span></div>
            <div id="map"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; height: 250px;">
            <div class="pane">
                <div class="pane-header">NETWORK SIGNAL RADAR</div>
                <div class="radar-container">
                    <div class="radar-circle" style="width:50px; height:50px;"></div>
                    <div class="radar-circle" style="width:100px; height:100px;"></div>
                    <div class="radar-circle" style="width:150px; height:150px;"></div>
                    <div class="radar-sweep"></div>
                    <div id="radar-dots"></div>
                </div>
            </div>
            <div class="pane">
                <div class="pane-header">BITSTREAM DECRYPTION (AES-256)</div>
                <div class="decrypt-box" id="decryption-stream">
                    <!-- Brute force sim -->
                </div>
            </div>
        </div>
    </div>

    <!-- Right: Logs and Analytics -->
    <div class="pane">
        <div class="pane-header">SYSTEM COMMAND LOGS <span>RAW_FEED</span></div>
        <div class="console" id="log-console">
            <!-- Logs -->
        </div>
        <div class="pane" style="height: 200px; border:none; border-top: 1px solid var(--border)">
            <div class="pane-header">IO_TRAFFIC_ANALYSIS</div>
            <canvas id="trafficChart" style="padding:10px;"></canvas>
        </div>
    </div>
</div>

<script>
    // --- Map Initialization ---
    // استخدام خريطة داكنة لتبدو احترافية
    const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const locations = [
        {lat: 55.75, lng: 37.61, city: "Moscow"},
        {lat: 40.71, lng: -74.00, city: "New York"},
        {lat: 35.68, lng: 139.65, city: "Tokyo"},
        {lat: 24.71, lng: 46.67, city: "Riyadh"},
        {lat: 51.50, lng: -0.12, city: "London"}
    ];

    locations.forEach(loc => {
        L.circleMarker([loc.lat, loc.lng], {
            radius: 5,
            color: '#00ff9d',
            fillOpacity: 0.8
        }).addTo(map).bindTooltip(loc.city);
    });

    // --- Data Generators ---
    const targetsList = document.getElementById('targets-list');
    const logConsole = document.getElementById('log-console');
    const decryptBox = document.getElementById('decryption-stream');

    function createTarget(ip, os) {
        const div = document.createElement('div');
        div.className = 'target-card';
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between">
                <span>IP: ${ip}</span>
                <span style="color:#8b949e">${os}</span>
            </div>
            <div class="progress-mini"><div class="progress-inner" style="width:${Math.random()*100}%"></div></div>
        `;
        targetsList.appendChild(div);
    }

    const ips = ["192.168.1.45", "45.33.22.11", "89.208.24.102", "103.44.1.8", "172.16.0.4"];
    ips.forEach(ip => createTarget(ip, "Linux 5.4"));

    function addLog(msg) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = `<span class="ts">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
        logConsole.prepend(div);
        if(logConsole.childElementCount > 50) logConsole.lastChild.remove();
    }

    // --- Brute Force Animation ---
    const chars = "ABCDEF0123456789";
    setInterval(() => {
        let line = "";
        for(let i=0; i<16; i++) {
            line += chars[Math.floor(Math.random()*chars.length)];
        }
        const div = document.createElement('div');
        div.className = 'hash-line';
        div.innerHTML = `<span>ADDR_${Math.floor(Math.random()*9000)}</span> <span class="hash-char">${line}</span>`;
        decryptBox.prepend(div);
        if(decryptBox.childElementCount > 15) decryptBox.lastChild.remove();
    }, 150);

    // --- Radar Dots ---
    const radarDots = document.getElementById('radar-dots');
    setInterval(() => {
        radarDots.innerHTML = '';
        for(let i=0; i<3; i++) {
            const dot = document.createElement('div');
            dot.style.position = 'absolute';
            dot.style.width = '4px';
            dot.style.height = '4px';
            dot.style.background = '#00ff9d';
            dot.style.borderRadius = '50%';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.top = Math.random() * 100 + '%';
            dot.style.boxShadow = '0 0 10px #00ff9d';
            radarDots.appendChild(dot);
        }
    }, 2000);

    // --- Traffic Chart ---
    const ctx = document.getElementById('trafficChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(20).fill(''),
            datasets: [{
                data: Array(20).fill(0),
                borderColor: '#00ff9d',
                borderWidth: 1,
                tension: 0.4,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { display: false, min: 0, max: 100 } }
        }
    });

    setInterval(() => {
        chart.data.datasets[0].data.shift();
        chart.data.datasets[0].data.push(Math.random() * 100);
        chart.update('none');
    }, 1000);

    // --- UI Interactions ---
    function generatePayload() {
        addLog("COMPILING MALICIOUS STAGER...");
        setTimeout(() => addLog("OBFUSCATION COMPLETE: 128-BIT POLYMORPHIC"), 800);
        setTimeout(() => addLog("INJECTING VIA SMB EXPLOIT..."), 1500);
        setTimeout(() => addLog("SUCCESS: CALLBACK RECEIVED FROM 45.33.22.11", "warn"), 2500);
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toISOString().split('T')[1].split('.')[0] + " UTC";
        if(Math.random() > 0.8) addLog("Incoming packet from node " + Math.floor(Math.random()*255) + ".x.x.x");
    }, 1000);

    addLog("FADI_C2 TERMINAL INITIALIZED.");
    addLog("READY FOR COMMANDS.");
</script>

</body>
</html>
