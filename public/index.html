<script>
    let currentUser = null;
    let selectedUser = null;
    let usersData = [];
    let socket;
    let localStream;
    let peerConnection;
    
    // خوادم جوجل للمساعدة فقط، والتبادل سيتم عبر السيرفر حقك
    const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

    async function doAuth() {
        const name = document.getElementById('u-name').value;
        const password = document.getElementById('u-pass').value;
        if(!name || !password) return alert("الرجاء إدخال البيانات");
        try {
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, password, action: 'login' })
            });
            const data = await res.json();
            if(res.ok) {
                currentUser = data;
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                document.getElementById('my-name').innerText = currentUser.name;
                fetchInitialData();
                initializeSocket();
            } else { alert(data.error); }
        } catch(e) { alert("خطأ في الاتصال"); }
    }

    async function fetchInitialData() {
        try {
            const res = await fetch(`/api/sync`);
            const data = await res.json();
            if (data && data.users) { usersData = data.users; renderUsers(); }
        } catch(e) {}
    }

    function initializeSocket() {
        socket = io();
        socket.on('connect', () => { socket.emit('user_connected', currentUser.id); });
        socket.on('update_users_status', () => { fetchInitialData(); });
        socket.on('receive_message', (msg) => {
            if(selectedUser && (msg.from === selectedUser.id || msg.to === selectedUser.id)) appendMessage(msg);
        });

        // استقبال المكالمة
        socket.on('incoming_call', async (data) => {
            window.incomingCallData = data;
            document.getElementById('caller-name').innerText = data.name;
            document.getElementById('incoming-call-modal').classList.remove('hidden');
            document.getElementById('ringtone').play();
        });

        // استقبال الرد
        socket.on('call_accepted', async (signal) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
        });

        // استقبال بيانات العبور الإجبارية من السيرفر
        socket.on('ice_candidate', async (data) => {
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    console.log("⚡ تم استقبال مسار عبور جديد عبر السيرفر");
                } catch (e) {}
            }
        });
    }

    // --- وظائف الاتصال المتطورة ---
    async function initiateCall(type) {
        if(!selectedUser) return;
        document.getElementById('call-screen').classList.remove('hidden');
        document.getElementById('call-target-name').innerText = selectedUser.name;

        peerConnection = new RTCPeerConnection(servers);
        localStream = await navigator.mediaDevices.getUserMedia({ video: type === 'video', audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                // إرسال المسار للسيرفر فوراً ليمرره للطرف الثاني
                socket.emit('ice_candidate', { to: selectedUser.id, candidate: event.candidate, from: currentUser.id });
            }
        };

        peerConnection.ontrack = (event) => {
            document.getElementById('remoteVideo').srcObject = event.streams[0];
            document.getElementById('call-status-text').innerText = "مكالمة جارية";
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        socket.emit('call_user', { userToCall: selectedUser.id, from: currentUser.id, name: currentUser.name, signalData: offer });
    }

    async function acceptCall() {
        document.getElementById('ringtone').pause();
        document.getElementById('incoming-call-modal').classList.add('hidden');
        document.getElementById('call-screen').classList.remove('hidden');
        
        const data = window.incomingCallData;
        peerConnection = new RTCPeerConnection(servers);
        
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit('ice_candidate', { to: data.from, candidate: event.candidate, from: currentUser.id });
            }
        };

        peerConnection.ontrack = (event) => {
            document.getElementById('remoteVideo').srcObject = event.streams[0];
        };

        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signalData));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        socket.emit('answer_call', { to: data.from, signal: answer });
    }

    function endCall() {
        if(localStream) localStream.getTracks().forEach(track => track.stop());
        if(peerConnection) peerConnection.close();
        document.getElementById('call-screen').classList.add('hidden');
        location.reload(); // لإعادة تهيئة الاتصال
    }

    // (بقية الدوال renderUsers, sendMessage, appendMessage تبقى كما هي)
    function renderUsers() {
        const list = document.getElementById('users-list');
        list.innerHTML = usersData.filter(u => u.id !== currentUser.id).map(u => `
            <div onclick="openChat('${u.id}', '${u.name}', ${u.isOnline})" class="user-item p-4 flex items-center gap-3 cursor-pointer hover:bg-white/5 transition ${selectedUser?.id === u.id ? 'active' : ''}">
                <div class="relative w-12 h-12 rounded-full bg-[#2a2a35] flex items-center justify-center text-white text-lg">
                    ${u.name.charAt(0)}
                    ${u.isOnline ? '<div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-[var(--bg-sidebar)]"></div>' : ''}
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-sm text-gray-200">${u.name}</h4>
                    <p class="text-xs text-gray-500 truncate">${u.isOnline ? 'متصل' : 'غير متصل'}</p>
                </div>
            </div>
        `).join('');
    }

    function openChat(id, name, isOnline) {
        selectedUser = { id, name };
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('chat-header').classList.remove('hidden');
        document.getElementById('chat-messages').classList.remove('hidden');
        document.getElementById('chat-input-area').classList.remove('hidden');
        document.getElementById('chat-user-name').innerText = name;
        document.getElementById('chat-user-status').innerText = isOnline ? 'متصل الآن' : 'غير متصل';
        document.getElementById('chat-messages').innerHTML = '';
        renderUsers();
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text || !selectedUser) return;
        const msgObj = { from: currentUser.id, to: selectedUser.id, text, time: new Date() };
        socket.emit('send_message', msgObj);
        appendMessage(msgObj);
        input.value = '';
    }

    function appendMessage(m) {
        const container = document.getElementById('chat-messages');
        const isMe = m.from === currentUser.id;
        const time = new Date(m.time).toLocaleTimeString('ar-YE', { hour: '2-digit', minute: '2-digit' });
        container.innerHTML += `<div class="msg-bubble ${isMe ? 'msg-sent' : 'msg-received'}">${m.text}<span class="msg-time ${isMe ? 'text-black/60' : 'text-white/40'}">${time}</span></div>`;
        container.scrollTop = container.scrollHeight;
    }
</script>
